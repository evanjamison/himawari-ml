name: multiday-rollup

on:
  workflow_dispatch:
    inputs:
      lookback_days:
        description: "Number of consecutive days to pool frames from."
        required: false
        default: "3"
      start_day:
        description: "Start date (YYYY-MM-DD). Leave blank to use most recent N days."
        required: false
        default: ""
      unet_epochs:
        description: "U-Net training epochs."
        required: false
        default: "40"
      luma_thresh:
        description: "Baseline luma threshold. Lower = more clouds detected."
        required: false
        default: "0.35"
      sat_thresh:
        description: "Baseline saturation threshold."
        required: false
        default: "0.30"
      min_area:
        description: "Minimum cloud component area in pixels."
        required: false
        default: "60"

permissions:
  contents: write

concurrency:
  group: multiday-rollup
  cancel-in-progress: false

jobs:
  rollup:
    runs-on: ubuntu-latest

    env:
      LOOKBACK_DAYS:  ${{ github.event.inputs.lookback_days || '3' }}
      START_DAY:      ${{ github.event.inputs.start_day     || '' }}
      UNET_EPOCHS:    ${{ github.event.inputs.unet_epochs   || '40' }}
      LUMA_THRESH:    ${{ github.event.inputs.luma_thresh   || '0.35' }}
      SAT_THRESH:     ${{ github.event.inputs.sat_thresh    || '0.30' }}
      MIN_AREA:       ${{ github.event.inputs.min_area      || '60' }}

    steps:
      - name: Checkout data branch
        uses: actions/checkout@v4
        with:
          ref: data
          fetch-depth: 0

      - name: Configure git identity
        shell: bash
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@users.noreply.github.com"

      - name: Bring pipeline code from main
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main --depth=1
          git checkout origin/main -- src scripts ml requirements.txt pyproject.toml || true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .
          pip install opencv-python-headless

      - name: Resolve target DAY
        id: resolve
        shell: bash
        run: |
          set -euo pipefail
          RAWROOT="data/raw"

          [[ -d "$RAWROOT" ]] || { echo "ERROR: $RAWROOT missing"; exit 1; }
          mapfile -t ALL_DAYS < <(find "$RAWROOT" -maxdepth 1 -mindepth 1 -type d -name "????-??-??" -printf "%f\n" | sort)
          [[ ${#ALL_DAYS[@]} -gt 0 ]] || { echo "ERROR: No YYYY-MM-DD folders found"; exit 1; }

          DAY="${ALL_DAYS[-1]}"
          LABEL="${START_DAY:-$DAY}"
          OUTDIR="out/${LABEL}_multiday${LOOKBACK_DAYS}d"
          OUTFRAMES="$OUTDIR/frames"

          echo "day=$DAY"             >> "$GITHUB_OUTPUT"
          echo "label=$LABEL"         >> "$GITHUB_OUTPUT"
          echo "outdir=$OUTDIR"       >> "$GITHUB_OUTPUT"
          echo "outframes=$OUTFRAMES" >> "$GITHUB_OUTPUT"
          echo "Resolved DAY=$DAY  LABEL=$LABEL  OUTDIR=$OUTDIR"

      - name: Pool frames from selected days
        shell: bash
        run: |
          set -euo pipefail
          RAWROOT="data/raw"
          OUTFRAMES="${{ steps.resolve.outputs.outframes }}"
          mkdir -p "$OUTFRAMES"

          mapfile -t ALL_DAYS < <(find "$RAWROOT" -maxdepth 1 -mindepth 1 -type d -name "????-??-??" -printf "%f\n" | sort)

          N="${LOOKBACK_DAYS}"
          if [[ -n "${START_DAY}" ]]; then
            USE_DAYS=()
            for i in $(seq 0 $(( N - 1 ))); do
              # Pure bash date arithmetic — no python3 needed
              D=$(date -d "${START_DAY} + ${i} days" +%F)
              [[ -d "$RAWROOT/$D" ]] && USE_DAYS+=("$D") || echo "WARNING: $D not found — skipping"
            done
          else
            TOTAL="${#ALL_DAYS[@]}"
            START=$(( TOTAL - N ))
            [[ $START -lt 0 ]] && START=0
            USE_DAYS=("${ALL_DAYS[@]:$START:$N}")
          fi

          echo "Pooling from: ${USE_DAYS[*]}"
          COPIED=0
          for D in "${USE_DAYS[@]}"; do
            DDIR="$RAWROOT/$D"
            if   [[ -d "$DDIR/filtered" ]]; then SRC="$DDIR/filtered"
            elif [[ -d "$DDIR/latest"   ]]; then SRC="$DDIR/latest"
            else echo "Skipping $D — no frames folder"; continue
            fi
            shopt -s globstar nullglob
            for f in "$SRC"/**/*.png "$SRC"/*.png; do
              [[ -f "$f" ]] && { cp -f "$f" "$OUTFRAMES/"; COPIED=$((COPIED+1)); }
            done
            echo "  $D: copied"
          done

          echo "Total frames pooled: $COPIED"
          [[ $COPIED -gt 0 ]] || { echo "ERROR: No frames found"; exit 1; }

      - name: Phase 3A - Baseline cloud masks
        id: p3baseline
        shell: bash
        run: |
          set -euo pipefail
          OUTDIR="${{ steps.resolve.outputs.outdir }}"
          BASELINE_OUTDIR="$OUTDIR/phase2_baseline"
          mkdir -p "$BASELINE_OUTDIR"

          python scripts/experiments/segmentation/cloud_mask_baseline_v2.py \
            --raw-dir    "${{ steps.resolve.outputs.outframes }}" \
            --outdir     "$BASELINE_OUTDIR" \
            --image-size 256 \
            --save-overlays \
            --luma-thresh "${LUMA_THRESH}" \
            --sat-thresh  "${SAT_THRESH}" \
            --min-area    "${MIN_AREA}"

          echo "masks_dir=$BASELINE_OUTDIR/masks" >> "$GITHUB_OUTPUT"

      - name: Phase 3B - Train U-Net
        id: p3train
        shell: bash
        run: |
          set -euo pipefail

          python ml/train_unet_pixelmask.py \
            --frames-dir "${{ steps.resolve.outputs.outframes }}" \
            --masks-dir  "${{ steps.p3baseline.outputs.masks_dir }}" \
            --outdir out \
            --image-size 256 \
            --epochs "${UNET_EPOCHS}" \
            --batch-size 8 \
            --lr 3e-4 \
            --base-ch 32 \
            --augment \
            --bce-weight 0.5 \
            --pos-weight 3.0 \
            --split-by-time

          echo "model_path=out/models/unet_pixelmask_latest.pt" >> "$GITHUB_OUTPUT"

      - name: Phase 3C - Infer U-Net masks (thr=0.3)
        id: p3infer
        shell: bash
        run: |
          set -euo pipefail
          OUTDIR="${{ steps.resolve.outputs.outdir }}"
          CANON_OUT="$OUTDIR/phase3_unet_pixelmask_thr03"
          mkdir -p "$CANON_OUT"

          python ml/infer_unet_pixelmask.py \
            --frames    "${{ steps.resolve.outputs.outframes }}" \
            --outdir    "$CANON_OUT" \
            --ckpt      "${{ steps.p3train.outputs.model_path }}" \
            --recursive \
            --threshold 0.3 \
            --image-size 256 \
            --device cpu

          echo "canon_out=$CANON_OUT" >> "$GITHUB_OUTPUT"

      - name: Collect U-Net training curves
        if: always()
        shell: bash
        run: |
          OUTDIR="${{ steps.resolve.outputs.outdir }}"
          mkdir -p "$OUTDIR/phase3_unet_pixelmask_thr03"
          cp out/viz/unet_training_curves.png "$OUTDIR/phase3_unet_pixelmask_thr03/" 2>/dev/null || true
          cp out/viz/unet_val_previews.png    "$OUTDIR/phase3_unet_pixelmask_thr03/" 2>/dev/null || true

      # Write a handoff file so the ConvLSTM workflow knows where everything lives
      - name: Write handoff metadata
        shell: bash
        run: |
          set -euo pipefail
          OUTDIR="${{ steps.resolve.outputs.outdir }}"
          LABEL="${{ steps.resolve.outputs.label }}"
          DAY="${{ steps.resolve.outputs.day }}"
          OUTFRAMES="${{ steps.resolve.outputs.outframes }}"
          CANON_OUT="${{ steps.p3infer.outputs.canon_out }}"
          MODEL_PATH="${{ steps.p3train.outputs.model_path }}"
          mkdir -p "$OUTDIR"
          printf '{\n  "label": "%s",\n  "day": "%s",\n  "outdir": "%s",\n  "outframes": "%s",\n  "canon_out": "%s",\n  "model_path": "%s",\n  "lookback_days": "%s"\n}\n' \
            "$LABEL" "$DAY" "$OUTDIR" "$OUTFRAMES" "$CANON_OUT" "$MODEL_PATH" "$LOOKBACK_DAYS" \
            > "$OUTDIR/handoff.json"
          echo "Wrote $OUTDIR/handoff.json:"
          cat "$OUTDIR/handoff.json"

      - name: Upload U-Net artifact
        uses: actions/upload-artifact@v4
        with:
          name: multiday_unet_${{ steps.resolve.outputs.label }}_${{ env.LOOKBACK_DAYS }}d
          if-no-files-found: warn
          path: |
            ${{ steps.resolve.outputs.outdir }}/phase3_unet_pixelmask_thr03
            ${{ steps.resolve.outputs.outdir }}/phase2_baseline/cloud_metrics.csv

      - name: Commit U-Net results to data branch
        shell: bash
        run: |
          set -euo pipefail
          git add -f out "${{ steps.resolve.outputs.outdir }}" || true

          if git diff --cached --quiet; then
            echo "Nothing to commit."
            exit 0
          fi

          git commit -m "multiday-rollup (unet done): ${{ steps.resolve.outputs.label }} ${LOOKBACK_DAYS}d"
          git fetch origin data
          git pull --rebase --autostash origin data
          git push origin data
